<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>QariAI — 30s demo</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /*
   * 30-second demo — cycles the pre-composed marketing frames 1, 3, 5, 6, 7
   * (sitting in /marketing/frames) as full-bleed 9:16 slides, then lands on
   * a clean CTA. Each frame already carries its own headline in-artwork, so
   * no caption overlays needed.
   *
   * Timeline (seconds · percent of 30s):
   *   0.0 –  5.0   Frame 1  — "Fix your recitation instantly"
   *   5.0 – 10.0   Frame 3  — "Like a teacher beside you"
   *  10.0 – 15.5   Frame 5  — "Track your improvement"
   *  15.5 – 20.5   Frame 6  — "Stay consistent"
   *  20.5 – 26.0   Frame 7  — "Stay motivated as you improve"
   *  26.0 – 30.0   CTA      — QariAI · qariai.app
   */

  :root {
    --brand: #0F8F71;
    --brand-dark: #085041;
    --text-primary: #1C1917;
    --text-secondary: #57534E;
    --bg-secondary: #F5F2EA;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: var(--text-primary);
    font-family: var(--font-sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* 9:16 stage locked to the viewport */
  .stage {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100vmin;
    aspect-ratio: 9 / 16;
    max-width: 100vw;
    max-height: 100vh;
    background: #F5F2EA;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(15, 110, 86, 0.15);
  }

  /* Each slide fills the stage and fades in during its slot.
     A 0.5s cross-fade between slides is built into the keyframe timing. */
  .slide {
    position: absolute; inset: 0;
    opacity: 0;
  }
  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Keyframes — each slide uses a single 30s animation with sharp in/out
     windows. The `x% { opacity: 1 }` pairs are the visible hold period. */
  .slide-1 { animation: s1 30s linear 1 forwards; }
  .slide-3 { animation: s3 30s linear 1 forwards; }
  .slide-5 { animation: s5 30s linear 1 forwards; }
  .slide-6 { animation: s6 30s linear 1 forwards; }
  .slide-7 { animation: s7 30s linear 1 forwards; }
  .slide-cta { animation: scta 30s linear 1 forwards; }

  @keyframes s1 {
    0%   { opacity: 0 }
    2%   { opacity: 1 }
    15%  { opacity: 1 }
    17%  { opacity: 0 }
    100% { opacity: 0 }
  }
  @keyframes s3 {
    0%, 15% { opacity: 0 }
    17% { opacity: 1 }
    32% { opacity: 1 }
    34% { opacity: 0 }
    100% { opacity: 0 }
  }
  @keyframes s5 {
    0%, 32% { opacity: 0 }
    34% { opacity: 1 }
    50% { opacity: 1 }
    52% { opacity: 0 }
    100% { opacity: 0 }
  }
  @keyframes s6 {
    0%, 50% { opacity: 0 }
    52% { opacity: 1 }
    67% { opacity: 1 }
    69% { opacity: 0 }
    100% { opacity: 0 }
  }
  @keyframes s7 {
    0%, 67% { opacity: 0 }
    69% { opacity: 1 }
    85% { opacity: 1 }
    87% { opacity: 0 }
    100% { opacity: 0 }
  }
  @keyframes scta {
    0%, 85% { opacity: 0 }
    87% { opacity: 1 }
    100% { opacity: 1 }
  }

  /* ── Final CTA slide ─────────────────────────────────── */
  .cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4%;
    padding: 10%;
    text-align: center;
    background: #ffffff;
  }
  .cta-logo {
    display: flex;
    align-items: center;
    gap: 2vmin;
    opacity: 0;
    animation: cta-in 30s linear 1 forwards;
  }
  @keyframes cta-in {
    0%, 87% { opacity: 0; transform: translateY(10px) }
    89% { opacity: 1; transform: translateY(0) }
    100% { opacity: 1 }
  }
  .cta-logo svg { width: 12vmin; height: 12vmin; }
  .cta-brand {
    font-size: clamp(32px, 7vmin, 80px);
    font-weight: 900;
    letter-spacing: -1.2px;
    line-height: 1;
  }
  .cta-brand .q { color: var(--text-primary); }
  .cta-brand .ai { color: var(--brand); }
  .cta-tagline {
    font-size: clamp(13px, 2.2vmin, 24px);
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 1%;
    opacity: 0;
    animation: cta-tag 30s linear 1 forwards;
  }
  @keyframes cta-tag {
    0%, 89% { opacity: 0 }
    91% { opacity: 1 }
    100% { opacity: 1 }
  }
  .cta-url {
    font-size: clamp(18px, 3.4vmin, 40px);
    color: var(--brand);
    font-weight: 700;
    margin-top: 4%;
    letter-spacing: -0.3px;
    opacity: 0;
    animation: cta-url 30s linear 1 forwards;
  }
  @keyframes cta-url {
    0%, 92% { opacity: 0; transform: translateY(6px) }
    94% { opacity: 1; transform: translateY(0) }
    100% { opacity: 1 }
  }
  .cta-sub {
    font-size: clamp(13px, 2vmin, 22px);
    color: var(--text-secondary);
    margin-top: 1%;
    opacity: 0;
    animation: cta-sub 30s linear 1 forwards;
  }
  @keyframes cta-sub {
    0%, 94% { opacity: 0 }
    96% { opacity: 1 }
    100% { opacity: 1 }
  }

  /* Timeline bar at bottom — 3px emerald fills the 30s */
  .timeline {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: var(--brand);
    width: 0;
    animation: timeline 30s linear 1 forwards;
    opacity: 0.35;
  }
  @keyframes timeline { to { width: 100%; } }
</style>
</head>
<body>

<div class="stage">

  <!-- ═══ Frame 1 — Problem / Fix your recitation instantly ═══ -->
  <div class="slide slide-1">
    <img src="frames/gpc-v23-frame1.jpg" alt="" />
  </div>

  <!-- ═══ Frame 3 — Magic moment / Like a teacher beside you ═══ -->
  <div class="slide slide-3">
    <img src="frames/gpc-v23-frame3.jpg" alt="" />
  </div>

  <!-- ═══ Frame 5 — Progress / Track your improvement ═══ -->
  <div class="slide slide-5">
    <img src="frames/gpc-v23-frame5.jpg" alt="" />
  </div>

  <!-- ═══ Frame 6 — Habit / Stay consistent ═══ -->
  <div class="slide slide-6">
    <img src="frames/gpc-v23-frame6.jpg" alt="" />
  </div>

  <!-- ═══ Frame 7 — Motivation / Stay motivated as you improve ═══ -->
  <div class="slide slide-7">
    <img src="frames/gpc-v23-frame7.jpg" alt="" />
  </div>

  <!-- ═══ CTA — QariAI + qariai.app ═══ -->
  <div class="slide slide-cta cta">
    <div class="cta-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M19 22 Q7 50 19 78" fill="none" stroke="#0F8F71" stroke-width="6" stroke-linecap="round"/>
        <path d="M81 22 Q93 50 81 78" fill="none" stroke="#0F8F71" stroke-width="6" stroke-linecap="round"/>
        <path d="M32 32 Q25 50 32 68" fill="none" stroke="#0F8F71" stroke-width="6" stroke-linecap="round"/>
        <path d="M68 32 Q75 50 68 68" fill="none" stroke="#0F8F71" stroke-width="6" stroke-linecap="round"/>
        <rect x="38" y="16" width="24" height="48" rx="12" fill="none" stroke="#1c1917" stroke-width="5.5"/>
        <line x1="50" y1="66" x2="50" y2="80" stroke="#1c1917" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="39" y1="82" x2="61" y2="82" stroke="#1c1917" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
      <span class="cta-brand"><span class="q">Qari</span><span class="ai">AI</span></span>
    </div>
    <div class="cta-tagline">Tajweed + Hifz Coach</div>
    <div style="text-align: center;">
      <div class="cta-sub">Start free at</div>
      <div class="cta-url">qariai.app</div>
    </div>
  </div>

  <div class="timeline"></div>
</div>

<script>
  // Press "r" to replay — useful when choosing a take to screen-record.
  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') location.reload();
  });
</script>
</body>
</html>
